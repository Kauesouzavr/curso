<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Curso</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🚀 Mini Curso Exclusivo</h1>
    <p>Aprenda passo a passo e tenha resultados rápidos!</p>

    <div class="card">
        <h2>O que você vai aprender:</h2>
        <ul>
            <li>✔ Método simples</li>
            <li>✔ Estratégias práticas</li>
            <li>✔ Resultados rápidos</li>
        </ul>

        <!-- COMPRA -->
        <form action="/comprar" method="POST">
            <input type="email" name="email" placeholder="Seu email" required>
            <button type="submit">💳 Comprar agora</button>
        </form>

        <hr>

        <!-- ACESSO -->
        <h3>Já comprou?</h3>
        <form action="/curso" method="POST">
            <input type="email" name="email" placeholder="Digite seu email" required>
            <button type="submit">🔓 Acessar curso</button>
        </form>

    </div>
</div>

</body>
</html>
