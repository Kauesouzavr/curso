<h1>📊 Painel Admin</h1>

<h2>Usuários</h2>
<table border="1">
<tr>
    <th>Email</th>
    <th>Status</th>
</tr>

{% for u in usuarios %}
<tr>
    <td>{{ u[0] }}</td>
    <td>{{ u[1] }}</td>
</tr>
{% endfor %}
</table>

<h2>Progresso</h2>
<table border="1">
<tr>
    <th>Email</th>
    <th>Aulas Assistidas</th>
</tr>

{% for p in progresso %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
</tr>
{% endfor %}
</table>
