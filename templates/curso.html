<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seu Curso</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .aula {
            background: #1c1c1c;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
        }

        video {
            width: 100%;
            max-width: 700px;
            border-radius: 10px;
        }

        .ok {
            color: #00ff88;
            font-weight: bold;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="topo">
    <h2>🎬 Plataforma do Curso</h2>
    <a href="/logout" class="btn">Sair</a>
</div>

<h1>Bem-vindo ao seu curso 🚀</h1>

{% for aula in aulas %}
<div class="aula">
    <h2>{{ aula.titulo }}</h2>

    <video controls controlsList="nodownload"
        onended="marcar('{{ aula.id }}')">
        <source src="{{ url_for('static', filename=aula.video) }}" type="video/mp4">
        Seu navegador não suporta vídeo.
    </video>

    {% if aula.id in vistas %}
        <p class="ok">✔ Aula concluída</p>
    {% else %}
        <p>⏳ Ainda não assistida</p>
    {% endif %}
</div>
{% endfor %}

<script>
function marcar(aula){
    fetch('/marcar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({aula: aula})
    })
}
</script>

</body>
</html>
